# Blue-Green Deployment Configuration for WhatsOpí Production
# PCI DSS Level 1 and Dominican Law 172-13 compliant
# Supports zero-downtime deployments with instant rollback capability

apiVersion: v1
kind: Namespace
metadata:
  name: production
  labels:
    name: production
    compliance: pci-dss-law-172-13
    region: dominican-republic
---
# ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: whatsopi-config
  namespace: production
  labels:
    app: whatsopi
    version: v1.0.0
data:
  NODE_ENV: "production"
  TZ: "America/Santo_Domingo"
  DEFAULT_LANGUAGE: "es-DO"
  DEFAULT_CURRENCY: "DOP"
  DEFAULT_COUNTRY: "DO"
  CULTURAL_CONTEXT: "dominican"
  REGION: "caribbean"
  PCI_DSS_LEVEL: "1"
  LAW_172_13_COMPLIANT: "true"
  AUDIT_LOGGING_ENABLED: "true"
  ENCRYPTION_AT_REST: "true"
  ENCRYPTION_IN_TRANSIT: "true"
---
# Secret for sensitive configuration
apiVersion: v1
kind: Secret
metadata:
  name: whatsopi-secrets
  namespace: production
  labels:
    app: whatsopi
type: Opaque
data:
  # Base64 encoded secrets (will be populated by CI/CD)
  DATABASE_PASSWORD: ""
  REDIS_AUTH_TOKEN: ""
  JWT_SECRET: ""
  ENCRYPTION_KEY: ""
  WHATSAPP_TOKEN: ""
  PAYMENT_API_KEY: ""
---
# Blue Deployment - Frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsopi-frontend-blue
  namespace: production
  labels:
    app: whatsopi-frontend
    version: blue
    tier: frontend
    compliance: pci-dss
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: whatsopi-frontend
      version: blue
  template:
    metadata:
      labels:
        app: whatsopi-frontend
        version: blue
        tier: frontend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: whatsopi-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: whatsopi-frontend
        image: whatsopi/frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: whatsopi-config
              key: NODE_ENV
        - name: TZ
          valueFrom:
            configMapKeyRef:
              name: whatsopi-config
              key: TZ
        - name: PCI_DSS_LEVEL
          valueFrom:
            configMapKeyRef:
              name: whatsopi-config
              key: PCI_DSS_LEVEL
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        - name: cache-volume
          mountPath: /var/cache/nginx
      volumes:
      - name: tmp-volume
        emptyDir:
          sizeLimit: 100Mi
      - name: cache-volume
        emptyDir:
          sizeLimit: 100Mi
      nodeSelector:
        workload-type: general
      tolerations:
      - key: "workload-type"
        operator: "Equal"
        value: "general"
        effect: "NoSchedule"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - whatsopi-frontend
              topologyKey: kubernetes.io/hostname
---
