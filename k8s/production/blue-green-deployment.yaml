# Blue Deployment - Backend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsopi-backend-blue
  namespace: production
  labels:
    app: whatsopi-backend
    version: blue
    tier: backend
    compliance: pci-dss
spec:
  replicas: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
