        prometheus.io/port: "8080"
        prometheus.io/path: "/api/metrics"
    spec:
      serviceAccountName: whatsopi-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: whatsopi-backend
        image: whatsopi/backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: whatsopi-config
              key: NODE_ENV
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: whatsopi-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: whatsopi-secrets
              key: REDIS_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: whatsopi-secrets
              key: JWT_SECRET
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: whatsopi-secrets
              key: ENCRYPTION_KEY
        - name: WHATSAPP_TOKEN
          valueFrom:
            secretKeyRef:
              name: whatsopi-secrets
              key: WHATSAPP_TOKEN
        - name: PAYMENT_API_KEY
          valueFrom:
            secretKeyRef:
              name: whatsopi-secrets
              key: PAYMENT_API_KEY
        - name: PCI_DSS_LEVEL
          valueFrom:
            configMapKeyRef:
              name: whatsopi-config
              key: PCI_DSS_LEVEL
        - name: LAW_172_13_COMPLIANT
          valueFrom:
            configMapKeyRef:
              name: whatsopi-config
              key: LAW_172_13_COMPLIANT
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        - name: app-logs
          mountPath: /app/logs
      volumes:
      - name: tmp-volume
        emptyDir:
          sizeLimit: 100Mi
      - name: app-logs
        emptyDir:
          sizeLimit: 500Mi
      nodeSelector:
        workload-type: general
      tolerations:
      - key: "workload-type"
        operator: "Equal"
        value: "general"
        effect: "NoSchedule"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - whatsopi-backend
              topologyKey: kubernetes.io/hostname
