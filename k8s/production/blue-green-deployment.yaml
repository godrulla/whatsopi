---
# Service for Frontend
apiVersion: v1
kind: Service
metadata:
  name: whatsopi-frontend
  namespace: production
  labels:
    app: whatsopi-frontend
    tier: frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: whatsopi-frontend
    version: blue  # Points to blue by default
---
# Service for Backend
apiVersion: v1
kind: Service
metadata:
  name: whatsopi-backend
  namespace: production
  labels:
    app: whatsopi-backend
    tier: backend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: whatsopi-backend
    version: blue  # Points to blue by default
---
# Ingress for public access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: whatsopi-ingress
  namespace: production
  annotations:
    kubernetes.io/ingress.class: "aws-load-balancer-controller"
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:ACCOUNT:certificate/CERT-ID
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '15'
    alb.ingress.kubernetes.io/healthy-threshold-count: '2'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '2'
    # Security headers
    alb.ingress.kubernetes.io/actions.ssl-redirect: |
      {
        "Type": "redirect",
        "RedirectConfig": {
          "Protocol": "HTTPS",
          "Port": "443",
          "StatusCode": "HTTP_301"
        }
      }
    alb.ingress.kubernetes.io/actions.response-headers: |
      {
        "Type": "fixed-response",
        "FixedResponseConfig": {
          "ContentType": "text/plain",
          "StatusCode": "200",
          "MessageBody": "OK"
        },
        "ResponseHeaders": {
          "X-Frame-Options": "DENY",
          "X-Content-Type-Options": "nosniff",
          "X-XSS-Protection": "1; mode=block",
          "Strict-Transport-Security": "max-age=31536000; includeSubDomains; preload",
          "X-PCI-DSS-Compliant": "true",
          "X-Dominican-Law-172-13": "compliant"
        }
      }
spec:
  rules:
  - host: whatsopi.do
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: whatsopi-backend
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: whatsopi-frontend
            port:
              number: 80
  - host: api.whatsopi.do
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: whatsopi-backend
            port:
              number: 80
  tls:
  - hosts:
    - whatsopi.do
    - api.whatsopi.do
    secretName: whatsopi-tls
---
# HorizontalPodAutoscaler for Frontend
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: whatsopi-frontend-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: whatsopi-frontend-blue
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
---
# HorizontalPodAutoscaler for Backend
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: whatsopi-backend-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: whatsopi-backend-blue
  minReplicas: 5
  maxReplicas: 50
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
---
# ServiceAccount for WhatsOpí applications
apiVersion: v1
kind: ServiceAccount
metadata:
  name: whatsopi-service-account
  namespace: production
  labels:
    app: whatsopi
automountServiceAccountToken: true
---
# NetworkPolicy for security isolation
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: whatsopi-network-policy
  namespace: production
spec:
  podSelector:
    matchLabels:
      app: whatsopi-frontend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-system
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: production
    - podSelector:
        matchLabels:
          app: whatsopi-backend
    ports:
    - protocol: TCP
      port: 80
  - to: []
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
---
# PodDisruptionBudget for high availability
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: whatsopi-frontend-pdb
  namespace: production
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: whatsopi-frontend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: whatsopi-backend-pdb
  namespace: production
spec:
  minAvailable: 3
  selector:
    matchLabels:
      app: whatsopi-backend