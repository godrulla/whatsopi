# PostgreSQL Configuration for WhatsOpí Production
# PCI DSS Level 1 and Dominican Law 172-13 compliant
# Optimized for financial data processing in Dominican Republic

#------------------------------------------------------------------------------
# CONNECTIONS AND AUTHENTICATION
#------------------------------------------------------------------------------

# Connection settings
listen_addresses = '*'
port = 5432
max_connections = 200
superuser_reserved_connections = 3

# SSL/TLS Configuration (PCI DSS Requirement)
ssl = on
ssl_ciphers = 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256'
ssl_prefer_server_ciphers = on
ssl_min_protocol_version = 'TLSv1.2'

# Authentication
password_encryption = scram-sha-256
db_user_namespace = off

# Connection security
tcp_keepalives_idle = 600
tcp_keepalives_interval = 30
tcp_keepalives_count = 3

#------------------------------------------------------------------------------
# RESOURCE USAGE (MEMORY)
#------------------------------------------------------------------------------

# Memory settings optimized for financial workloads
shared_buffers = 512MB
huge_pages = try
temp_buffers = 16MB
max_prepared_transactions = 20

# Work memory for complex queries
work_mem = 32MB
hash_mem_multiplier = 2.0
maintenance_work_mem = 256MB
autovacuum_work_mem = 128MB

# Memory for connections
max_stack_depth = 2MB
dynamic_shared_memory_type = posix

#------------------------------------------------------------------------------
# WRITE AHEAD LOG (WAL) - Critical for financial data integrity
#------------------------------------------------------------------------------

# WAL settings for data integrity (PCI DSS requirement)
wal_level = replica
fsync = on
synchronous_commit = on
wal_sync_method = fsync
full_page_writes = on
wal_compression = on

# WAL buffers and checkpoints
wal_buffers = 16MB
checkpoint_timeout = 5min
checkpoint_completion_target = 0.9
checkpoint_warning = 30s
max_wal_size = 4GB
min_wal_size = 1GB

# Archive settings for compliance
archive_mode = on
archive_command = 'cp %p /archive/%f'
archive_timeout = 1800  # 30 minutes

#------------------------------------------------------------------------------
# REPLICATION (for high availability)
#------------------------------------------------------------------------------

# Replication settings
max_wal_senders = 10
wal_keep_size = 2GB
max_replication_slots = 10
hot_standby = on
hot_standby_feedback = on

# Synchronous replication for financial data
synchronous_standby_names = 'replica1,replica2'

#------------------------------------------------------------------------------
# QUERY TUNING
#------------------------------------------------------------------------------

# Query planner settings
random_page_cost = 1.1
effective_cache_size = 1GB
default_statistics_target = 100
constraint_exclusion = partition
cursor_tuple_fraction = 0.1

# Join settings
from_collapse_limit = 8
join_collapse_limit = 8

#------------------------------------------------------------------------------
# LOGGING (Dominican Law 172-13 Compliance)
#------------------------------------------------------------------------------

# Comprehensive logging for audit compliance
logging_collector = on
log_destination = 'stderr,csvlog'
log_directory = '/var/log/postgresql'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_file_mode = 0640
log_rotation_age = 1d
log_rotation_size = 100MB
log_truncate_on_rotation = on

# What to log (comprehensive for compliance)
log_connections = on
log_disconnections = on
log_duration = on
log_statement = 'all'
log_hostname = on
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

# Log levels
log_min_messages = info
log_min_error_statement = error
log_min_duration_statement = 1000  # Log queries > 1 second

# Additional logging for security
log_checkpoints = on
log_lock_waits = on
log_temp_files = 0
log_autovacuum_min_duration = 0

#------------------------------------------------------------------------------
# SECURITY AND ACCESS CONTROL
#------------------------------------------------------------------------------

# Password and authentication security
password_encryption = scram-sha-256
krb_server_keyfile = ''

# Row Level Security (for data isolation)
row_security = on

# Statement timeout (prevent runaway queries)
statement_timeout = 300000  # 5 minutes
lock_timeout = 30000        # 30 seconds
idle_in_transaction_session_timeout = 600000  # 10 minutes

#------------------------------------------------------------------------------
# BACKGROUND WRITER AND CHECKPOINTER
#------------------------------------------------------------------------------

# Background writer settings
bgwriter_delay = 200ms
bgwriter_lru_maxpages = 100
bgwriter_lru_multiplier = 2.0
bgwriter_flush_after = 512kB

#------------------------------------------------------------------------------
# VACUUM AND ANALYZE
#------------------------------------------------------------------------------

# Autovacuum settings (critical for performance)
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 30s
autovacuum_vacuum_threshold = 50
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_threshold = 50
autovacuum_analyze_scale_factor = 0.05
autovacuum_freeze_max_age = 200000000
autovacuum_multixact_freeze_max_age = 400000000
autovacuum_vacuum_cost_delay = 10ms
autovacuum_vacuum_cost_limit = 1000

#------------------------------------------------------------------------------
# CUSTOMIZED OPTIONS FOR WHATSOPI
#------------------------------------------------------------------------------

# Timezone for Dominican Republic
timezone = 'America/Santo_Domingo'
timezone_abbreviations = 'Default'

# Locale settings for Dominican Republic
lc_messages = 'es_DO.UTF-8'
lc_monetary = 'es_DO.UTF-8'
lc_numeric = 'es_DO.UTF-8'
lc_time = 'es_DO.UTF-8'

# Default text search configuration for Spanish
default_text_search_config = 'pg_catalog.spanish'

#------------------------------------------------------------------------------
# CLIENT CONNECTION DEFAULTS
#------------------------------------------------------------------------------

# Default connection settings
search_path = '"$user", public'
default_tablespace = ''
temp_tablespaces = ''

# Isolation level for financial transactions
default_transaction_isolation = 'read committed'
default_transaction_read_only = off
default_transaction_deferrable = off

# Statement and transaction timeouts
session_replication_role = 'origin'
check_function_bodies = on

#------------------------------------------------------------------------------
# LOCK MANAGEMENT
#------------------------------------------------------------------------------

# Lock settings for high concurrency
deadlock_timeout = 1s
max_locks_per_transaction = 64
max_pred_locks_per_transaction = 64
max_pred_locks_per_relation = -2
max_pred_locks_per_page = 2

#------------------------------------------------------------------------------
# ERROR REPORTING AND LOGGING
#------------------------------------------------------------------------------

# Client error reporting
client_min_messages = notice
log_statement_stats = off
log_parser_stats = off
log_planner_stats = off
log_executor_stats = off

#------------------------------------------------------------------------------
# RUNTIME STATISTICS
#------------------------------------------------------------------------------

# Statistics collection for monitoring
track_activities = on
track_counts = on
track_io_timing = on
track_functions = all
stats_temp_directory = '/var/run/postgresql/stats_temp'

# Update statistics frequency
log_statement_stats = off
log_parser_stats = off
log_planner_stats = off
log_executor_stats = off

#------------------------------------------------------------------------------
# DOMINICAN REPUBLIC SPECIFIC SETTINGS
#------------------------------------------------------------------------------

# Custom settings for Dominican financial regulations
shared_preload_libraries = 'pg_stat_statements,pg_audit'

# Settings for audit logging (Law 172-13 compliance)
pg_audit.log = 'all'
pg_audit.log_catalog = on
pg_audit.log_parameter = on
pg_audit.log_relation = on
pg_audit.log_statement_once = off

# Data retention settings (7 years as per Dominican law)
# These are application-level settings noted here for reference
# actual implementation is in the application layer

#------------------------------------------------------------------------------
# EXTENSION-SPECIFIC SETTINGS
#------------------------------------------------------------------------------

# pg_stat_statements for query analysis
pg_stat_statements.max = 10000
pg_stat_statements.track = all
pg_stat_statements.track_utility = on
pg_stat_statements.save = on

#------------------------------------------------------------------------------
# PERFORMANCE MONITORING
#------------------------------------------------------------------------------

# Performance monitoring settings
log_slow_queries = on
slow_query_log_file = '/var/log/postgresql/slow-queries.log'

# Connection pooling preparation
max_prepared_transactions = 100

#------------------------------------------------------------------------------
# BACKUP AND RECOVERY SETTINGS
#------------------------------------------------------------------------------

# Recovery settings
recovery_init_sync_method = fsync
recovery_min_apply_delay = 0

# Continuous archiving
archive_cleanup_command = ''
recovery_end_command = ''

#------------------------------------------------------------------------------
# REPLICATION SECURITY
#------------------------------------------------------------------------------

# Standby settings
wal_receiver_status_interval = 10s
wal_receiver_timeout = 60s
wal_retrieve_retry_interval = 5s

#------------------------------------------------------------------------------
# DEVELOPMENT AND DEBUGGING (disabled in production)
#------------------------------------------------------------------------------

# Debug settings (all disabled for production)
debug_assertions = off
debug_print_parse = off
debug_print_rewritten = off
debug_print_plan = off
debug_pretty_print = on

#------------------------------------------------------------------------------
# RESOURCE LIMITS
#------------------------------------------------------------------------------

# Resource limits for stability
max_files_per_process = 1000
max_function_args = 100
max_identifier_length = 63
max_index_keys = 32

#------------------------------------------------------------------------------
# GENETIC QUERY OPTIMIZER
#------------------------------------------------------------------------------

# Genetic optimizer settings
geqo = on
geqo_threshold = 12
geqo_effort = 5
geqo_pool_size = 0
geqo_generations = 0
geqo_selection_bias = 2.0
geqo_seed = 0.0

#------------------------------------------------------------------------------
# PLANNER METHOD CONFIGURATION
#------------------------------------------------------------------------------

# Planner settings
enable_bitmapscan = on
enable_hashagg = on
enable_hashjoin = on
enable_indexscan = on
enable_indexonlyscan = on
enable_material = on
enable_mergejoin = on
enable_nestloop = on
enable_parallel_append = on
enable_parallel_hash = on
enable_partition_pruning = on
enable_partitionwise_join = on
enable_partitionwise_aggregate = on
enable_seqscan = on
enable_sort = on
enable_tidscan = on

#------------------------------------------------------------------------------
# PLANNER COST CONSTANTS
#------------------------------------------------------------------------------

# Cost settings tuned for SSD storage
seq_page_cost = 1.0
random_page_cost = 1.1
cpu_tuple_cost = 0.01
cpu_index_tuple_cost = 0.005
cpu_operator_cost = 0.0025
parallel_tuple_cost = 0.1
parallel_setup_cost = 1000.0
jit_above_cost = 100000
jit_inline_above_cost = 500000
jit_optimize_above_cost = 500000

# Effective I/O concurrency for SSD
effective_io_concurrency = 200
maintenance_io_concurrency = 10

#------------------------------------------------------------------------------
# SHARED PRELOAD LIBRARIES
#------------------------------------------------------------------------------

# Load required extensions for monitoring and compliance
shared_preload_libraries = 'pg_stat_statements,pg_audit,auto_explain'

# Auto explain settings for slow queries
auto_explain.log_min_duration = 1000
auto_explain.log_analyze = on
auto_explain.log_buffers = on
auto_explain.log_timing = on
auto_explain.log_triggers = on
auto_explain.log_verbose = on
auto_explain.log_nested_statements = on

#------------------------------------------------------------------------------
# ERROR HANDLING
#------------------------------------------------------------------------------

# Exit on error settings
exit_on_error = off
restart_after_crash = on

#------------------------------------------------------------------------------
# LOCALE AND FORMATTING
#------------------------------------------------------------------------------

# Dominican Republic specific formatting
datestyle = 'ISO, DMY'
intervalstyle = 'postgres'
lc_messages = 'es_DO.UTF-8'
lc_monetary = 'es_DO.UTF-8'
lc_numeric = 'es_DO.UTF-8'
lc_time = 'es_DO.UTF-8'

# Default timezone
log_timezone = 'America/Santo_Domingo'

#------------------------------------------------------------------------------
# COMPLIANCE NOTES
#------------------------------------------------------------------------------

# This configuration ensures:
# 1. PCI DSS Level 1 compliance through encryption and logging
# 2. Dominican Law 172-13 compliance through comprehensive audit trails
# 3. Financial data integrity through WAL settings
# 4. High availability through replication settings
# 5. Performance optimization for Caribbean network conditions
# 6. Security through authentication and access controls

