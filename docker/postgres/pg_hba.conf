# PostgreSQL Client Authentication Configuration File
# WhatsOpí Production - PCI DSS Level 1 and Dominican Law 172-13 Compliant
# Security-hardened authentication for financial data protection

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# "local" is for Unix domain socket connections only
local   all             all                                     scram-sha-256

# IPv4 local connections:
host    all             all             127.0.0.1/32            scram-sha-256

# IPv6 local connections:
host    all             all             ::1/128                 scram-sha-256

# Allow replication connections from localhost, by a user with the
# replication privilege.
local   replication     all                                     scram-sha-256
host    replication     all             127.0.0.1/32            scram-sha-256
host    replication     all             ::1/128                 scram-sha-256

#------------------------------------------------------------------------------
# PRODUCTION DATABASE CONNECTIONS
#------------------------------------------------------------------------------

# WhatsOpí application database connections
# Using SCRAM-SHA-256 for PCI DSS compliance
host    whatsopi        whatsopi        10.0.0.0/8              scram-sha-256
host    whatsopi        whatsopi_read   10.0.0.0/8              scram-sha-256

# Container network connections (Docker Compose)
host    whatsopi        whatsopi        172.16.0.0/12           scram-sha-256
host    whatsopi        whatsopi_read   172.16.0.0/12           scram-sha-256

# Kubernetes service network (EKS)
host    whatsopi        whatsopi        192.168.0.0/16          scram-sha-256
host    whatsopi        whatsopi_read   192.168.0.0/16          scram-sha-256

#------------------------------------------------------------------------------
# REPLICATION CONNECTIONS
#------------------------------------------------------------------------------

# Primary to replica replication
host    replication     replicator      10.0.21.0/24            scram-sha-256
host    replication     replicator      10.0.22.0/24            scram-sha-256
host    replication     replicator      10.0.23.0/24            scram-sha-256

# Cross-region replication for disaster recovery
host    replication     replicator      10.1.0.0/16             scram-sha-256

#------------------------------------------------------------------------------
# MONITORING AND BACKUP CONNECTIONS
#------------------------------------------------------------------------------

# PostgreSQL Exporter for Prometheus monitoring
host    postgres        postgres_exporter   10.0.0.0/8          scram-sha-256
host    postgres        postgres_exporter   172.16.0.0/12       scram-sha-256

# Backup connections
host    whatsopi        backup_user     10.0.0.0/8              scram-sha-256

# Database administration (restricted to specific subnet)
host    whatsopi        postgres        10.0.1.0/24             scram-sha-256
host    postgres        postgres        10.0.1.0/24             scram-sha-256

#------------------------------------------------------------------------------
# DEVELOPMENT AND STAGING (if needed)
#------------------------------------------------------------------------------

# Staging environment connections
host    whatsopi_staging   whatsopi_staging   10.1.0.0/16       scram-sha-256

#------------------------------------------------------------------------------
# AUDIT AND COMPLIANCE CONNECTIONS
#------------------------------------------------------------------------------

# Audit database connections for compliance reporting
host    audit_db        audit_user      10.0.0.0/8              scram-sha-256

# Data Protection Officer access for Law 172-13 compliance
host    whatsopi        dpo_user        10.0.1.0/24             scram-sha-256

#------------------------------------------------------------------------------
# SECURITY NOTES AND COMPLIANCE
#------------------------------------------------------------------------------

# Security Measures Implemented:
# 1. SCRAM-SHA-256 for all connections (PCI DSS requirement)
# 2. Network-based access control (defense in depth)
# 3. Separate read-only users for monitoring
# 4. Replication user with minimal privileges
# 5. No external network access allowed
# 6. Role-based access control aligned with business needs

# PCI DSS Compliance:
# - Strong authentication method (SCRAM-SHA-256)
# - Network segmentation enforcement
# - Audit trail capabilities
# - Access control by user role

# Dominican Law 172-13 Compliance:
# - User-based access control
# - Audit logging capabilities
# - Data access restriction by role
# - Administrator access logging

# IMPORTANT SECURITY NOTES:
# - Never use 'trust' method in production
# - Regularly rotate database passwords
# - Monitor authentication logs for suspicious activity
# - Review access patterns quarterly
# - Implement connection pooling to limit direct connections

# Incident Response:
# - All failed authentication attempts are logged
# - Unusual connection patterns trigger alerts
# - Geographic access restrictions enforced at network level
# - Emergency access procedures documented separately

# Configuration last updated: 2024
# Security review date: Quarterly
# Compliance audit date: Annual