# Default server configuration for WhatsOpí
# Optimized for Dominican Republic market

server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers specific to Dominican compliance
    include /etc/nginx/conf.d/security-headers.conf;

    # Main application
    location / {
        try_files $uri $uri/ /index.html;
        
        # Cache static assets for Caribbean network optimization
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
        }
        
        # Apply general rate limiting
        limit_req zone=general burst=20 nodelay;
    }

    # API proxy (if needed for same-origin)
    location /api/ {
        proxy_pass http://whatsopi-api:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts optimized for Caribbean network conditions
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # Apply API rate limiting
        limit_req zone=api burst=5 nodelay;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # WhatsApp webhook endpoint (if proxied through frontend)
    location /webhook/whatsapp {
        proxy_pass http://whatsopi-api:3000/webhook/whatsapp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Special handling for WhatsApp webhooks
        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
        
        # No rate limiting for webhooks to ensure delivery
        access_log /var/log/nginx/webhook_access.log main;
    }

    # Authentication endpoints with stricter rate limiting
    location ~ ^/(login|register|reset-password) {
        try_files $uri $uri/ /index.html;
        limit_req zone=login burst=3 nodelay;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to configuration files
    location ~* \.(htaccess|htpasswd|ini|log|sh|sql|conf)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # Custom error page for Dominican users
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
        add_header Content-Language es-DO;
    }
}