name: WhatsOpí CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *' # Daily at 6 AM UTC (2 AM Dominican time)

env:
  NODE_VERSION: '18'
  DOCKER_BUILDKIT: 1
  AWS_REGION: us-east-1

jobs:
  # Security and Dependency Scanning
  security-scan:
    name: Security & Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level high
        continue-on-error: true

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Run CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      - name: Upload security results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-results
          path: |
            security-report.json
            .sarif

  # Unit and Integration Tests
  test-suite:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test-type: [unit, integration, cultural, accessibility, security]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup test environment
        run: |
          cp .env.test.example .env.test
          npm run test:setup

      - name: Run unit tests
        if: matrix.test-type == 'unit'
        run: |
          npm run test:coverage
          npm run test:api

      - name: Run integration tests
        if: matrix.test-type == 'integration'
        run: |
          npm run test:integration
          npm run test:whatsapp
          npm run test:payments

      - name: Run cultural appropriateness tests
        if: matrix.test-type == 'cultural'
        run: |
          npm run test:cultural
          npm run test:voice:dominican
          npm run i18n:validate

      - name: Run accessibility tests
        if: matrix.test-type == 'accessibility'
        run: |
          npm run test:accessibility
          npm run test:voice:low-literacy

      - name: Run security compliance tests
        if: matrix.test-type == 'security'
        run: |
          npm run test:security
          npm run test:law-172-13
          npm run test:encryption

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.test-type }}
          path: |
            coverage/
            test-results/
            junit.xml

      - name: Upload coverage to Codecov
        if: matrix.test-type == 'unit'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          flags: unit-tests
          fail_ci_if_error: true

  # E2E Tests
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [
          'Dominican Low-End Android', 
          'Dominican Mid-Range Android',
          'Dominican Desktop Chrome'
        ]
        shard: [1, 2, 3, 4]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Build application
        run: npm run build

      - name: Start preview server
        run: npm run preview &

      - name: Wait for server
        run: npx wait-on http://localhost:4173 --timeout 60000

      - name: Run E2E tests
        run: |
          npx playwright test \
            --project="${{ matrix.project }}" \
            --shard=${{ matrix.shard }}/4

      - name: Upload E2E results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-report-${{ matrix.project }}-shard-${{ matrix.shard }}
          path: |
            test-results/
            playwright-report/

  # Performance Tests
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build:prod

      - name: Start preview server
        run: npm run preview &

      - name: Wait for server
        run: npx wait-on http://localhost:4173 --timeout 60000

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: './lighthouse.config.js'
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Run performance tests
        run: |
          npm run test:performance
          npm run test:mobile-performance
          npm run test:network-conditions

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: |
            lighthouse-report.json
            performance-results/

  # Build and Push Docker Images
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [security-scan, test-suite]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/whatsopi
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./src/api
          file: ./docker/Dockerfile.api
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/whatsopi-api:${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/whatsopi:latest
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-images, e2e-tests, performance-tests]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name whatsopi-staging-eks

      - name: Deploy to staging
        run: |
          helm upgrade --install whatsopi-staging ./helm/whatsopi \
            --namespace staging \
            --values ./helm/values-staging.yaml \
            --set image.tag=${{ github.sha }} \
            --wait --timeout 600s

      - name: Run smoke tests
        run: |
          npm run test:smoke:staging
          npm run test:health-check:staging

      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  # Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name whatsopi-prod-eks

      - name: Blue-Green Deployment
        run: |
          # Deploy to green environment
          helm upgrade --install whatsopi-green ./helm/whatsopi \
            --namespace production \
            --values ./helm/values-production.yaml \
            --set image.tag=${{ github.sha }} \
            --set environment=green \
            --wait --timeout 900s

      - name: Health check on green
        run: |
          npm run test:health-check:production:green
          npm run test:smoke:production:green

      - name: Switch traffic to green
        run: |
          kubectl patch service whatsopi-service \
            -p '{"spec":{"selector":{"version":"green"}}}' \
            --namespace production

      - name: Wait and verify
        run: |
          sleep 60
          npm run test:health-check:production

      - name: Clean up blue environment
        run: |
          helm uninstall whatsopi-blue --namespace production || true

      - name: Post-deployment tests
        run: |
          npm run test:post-deployment:production
          npm run test:performance:production

      - name: Notify successful deployment
        uses: 8398a7/action-slack@v3
        with:
          status: success
          channel: '#deployments'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          text: "🚀 WhatsOpí successfully deployed to production!"

  # Quality Gates Summary
  quality-gates:
    name: Quality Gates Summary
    runs-on: ubuntu-latest
    needs: [security-scan, test-suite, e2e-tests, performance-tests]
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate quality report
        run: |
          echo "# WhatsOpí Quality Gates Report" > quality-report.md
          echo "## Test Results Summary" >> quality-report.md
          
          # Process test results and generate summary
          # This would include coverage percentages, test pass rates, etc.
          
          echo "- Security Scan: ${{ needs.security-scan.result }}" >> quality-report.md
          echo "- Test Suite: ${{ needs.test-suite.result }}" >> quality-report.md
          echo "- E2E Tests: ${{ needs.e2e-tests.result }}" >> quality-report.md
          echo "- Performance Tests: ${{ needs.performance-tests.result }}" >> quality-report.md

      - name: Comment quality report on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('quality-report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

      - name: Fail if quality gates not met
        if: needs.security-scan.result == 'failure' || needs.test-suite.result == 'failure'
        run: |
          echo "❌ Quality gates failed. Deployment blocked."
          exit 1

      - name: Success notification
        if: success()
        run: |
          echo "✅ All quality gates passed successfully!"