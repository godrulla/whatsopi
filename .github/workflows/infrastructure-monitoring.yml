          echo "Network latency: ${LATENCY}ms"
          
          # Test connection quality
          PACKET_LOSS=$(ping -c 10 8.8.8.8 | grep 'packet loss' | awk '{print $6}' | sed 's/%//')
          echo "Packet loss: ${PACKET_LOSS}%"

      - name: Test Dominican Spanish voice processing
        run: |
          # Test voice processing with Dominican Spanish samples
          echo "Testing Dominican Spanish voice accuracy..."
          
          # This would integrate with your voice processing service
          # curl -X POST https://api.whatsopi.do/voice/test \
          #   -H "Content-Type: application/json" \
          #   -d '{"text":"Klk tiguer, busco pollo barato en el colmado","language":"es-DO"}'

      - name: Monitor Dominican payment systems
        run: |
          echo "Checking Dominican payment integrations..."
          
          # Check tPago integration
          # curl -s https://api.tpago.do/health || echo "tPago unreachable"
          
          # Check local bank connectivity
          # This would test connections to Dominican banks
          
          echo "Payment systems check completed"

      - name: Cultural appropriateness check
        run: |
          echo "Running cultural appropriateness validation..."
          
          # Test cultural markers and appropriateness
          # This would run your cultural validation tests
          
          echo "Cultural validation completed"

  # Security Monitoring
  security-monitoring:
    name: Security Monitoring
    runs-on: ubuntu-latest
    if: github.event.schedule == '*/5 * * * *' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check WAF metrics
        run: |
          # Get WAF blocked requests
          BLOCKED_REQUESTS=$(aws cloudwatch get-metric-statistics \
            --namespace AWS/WAFV2 \
            --metric-name BlockedRequests \
            --dimensions Name=WebACL,Value=whatsopi-waf \
            --start-time $(date -d '5 minutes ago' -u +%Y-%m-%dT%H:%M:%S) \
            --end-time $(date -u +%Y-%m-%dT%H:%M:%S) \
            --period 300 \
            --statistics Sum \
            --query 'Datapoints[0].Sum' \
            --output text 2>/dev/null || echo "0")
          
          echo "WAF blocked requests (last 5 min): $BLOCKED_REQUESTS"
          
          # Alert if too many blocked requests
          if [ "$BLOCKED_REQUESTS" -gt 100 ]; then
            echo "security_alert=true" >> $GITHUB_ENV
            echo "alert_message=High number of blocked requests: $BLOCKED_REQUESTS" >> $GITHUB_ENV
          fi

      - name: Check certificate expiration
        run: |
          # Check SSL certificate expiration
          CERT_EXPIRY=$(echo | openssl s_client -servername whatsopi.do -connect whatsopi.do:443 2>/dev/null | \
            openssl x509 -noout -enddate | cut -d= -f2)
          
          CERT_EXPIRY_EPOCH=$(date -d "$CERT_EXPIRY" +%s)
          CURRENT_EPOCH=$(date +%s)
          DAYS_UNTIL_EXPIRY=$(( (CERT_EXPIRY_EPOCH - CURRENT_EPOCH) / 86400 ))
          
          echo "SSL certificate expires in $DAYS_UNTIL_EXPIRY days"
          
          # Alert if certificate expires soon
          if [ "$DAYS_UNTIL_EXPIRY" -lt 30 ]; then
            echo "cert_alert=true" >> $GITHUB_ENV
            echo "cert_message=SSL certificate expires in $DAYS_UNTIL_EXPIRY days" >> $GITHUB_ENV
          fi

      - name: Check Dominican Law 172-13 compliance
        run: |
          echo "Running Dominican Law 172-13 compliance checks..."
          
          # Check data retention policies
          # Check encryption status
          # Check user consent records
          # Check cross-border data transfer logs
          
          echo "Compliance check completed"

      - name: Security alert
        if: env.security_alert == 'true' || env.cert_alert == 'true'
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#security-alerts'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          text: |
            🚨 Security Alert
            
            ${{ env.alert_message }}
            ${{ env.cert_message }}

  # Monitoring Summary
  monitoring-summary:
    name: Monitoring Summary
    runs-on: ubuntu-latest
    needs: [api-health-check, database-health-check, performance-monitoring, security-monitoring]
    if: always()
    
    steps:
      - name: Generate monitoring report
        run: |
          echo "# WhatsOpí Infrastructure Monitoring Report" > monitoring-report.md
          echo "Generated: $(date)" >> monitoring-report.md
          echo "" >> monitoring-report.md
          
          echo "## Job Status Summary" >> monitoring-report.md
          echo "- API Health Check: ${{ needs.api-health-check.result }}" >> monitoring-report.md
          echo "- Database Health Check: ${{ needs.database-health-check.result }}" >> monitoring-report.md
          echo "- Performance Monitoring: ${{ needs.performance-monitoring.result }}" >> monitoring-report.md
          echo "- Security Monitoring: ${{ needs.security-monitoring.result }}" >> monitoring-report.md
          echo "" >> monitoring-report.md
          
          # Determine overall health
          if [[ "${{ needs.api-health-check.result }}" == "success" && \
                "${{ needs.database-health-check.result }}" == "success" && \
                "${{ needs.security-monitoring.result }}" == "success" ]]; then
            echo "## Overall Status: ✅ HEALTHY" >> monitoring-report.md
          else
            echo "## Overall Status: ❌ ISSUES DETECTED" >> monitoring-report.md
          fi

      - name: Upload monitoring report
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-report-$(date +%Y%m%d-%H%M%S)
          path: monitoring-report.md

      - name: Daily monitoring summary
        if: github.event.schedule == '0 */2 * * *'
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#monitoring'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          text: |
            📊 Daily Infrastructure Monitoring Summary
            
            API Health: ${{ needs.api-health-check.result }}
            DB Health: ${{ needs.database-health-check.result }}
            Performance: ${{ needs.performance-monitoring.result }}
            Security: ${{ needs.security-monitoring.result }}
            
            View full report in GitHub Actions artifacts.