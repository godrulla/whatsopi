name: Infrastructure Monitoring & Health Checks

on:
  schedule:
    - cron: '*/5 * * * *' # Every 5 minutes
    - cron: '0 */2 * * *' # Every 2 hours for detailed checks
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to monitor'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging
      check_type:
        description: 'Type of health check'
        required: true
        default: 'all'
        type: choice
        options:
        - all
        - api
        - database
        - cache
        - monitoring

env:
  AWS_REGION: us-east-1

jobs:
  # API Health Checks
  api-health-check:
    name: API Health Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [production, staging]
        endpoint: [
          '/health',
          '/api/auth/health',
          '/api/users/health',
          '/api/payments/health',
          '/api/commerce/health',
          '/api/whatsapp/health'
        ]
    
    steps:
      - name: Check API endpoint
        id: health-check
        run: |
          ENVIRONMENT=${{ matrix.environment }}
          ENDPOINT=${{ matrix.endpoint }}
          
          if [ "$ENVIRONMENT" = "production" ]; then
            BASE_URL="https://api.whatsopi.do"
          else
            BASE_URL="https://api-staging.whatsopi.do"
          fi
          
          FULL_URL="${BASE_URL}${ENDPOINT}"
          
          echo "Checking: $FULL_URL"
          
          # Health check with timeout and retry
          RESPONSE=$(curl -s -w "%{http_code}:%{time_total}:%{time_connect}" \
            --max-time 10 \
            --retry 3 \
            --retry-delay 2 \
            "$FULL_URL" || echo "000:0:0")
          
          HTTP_CODE=$(echo $RESPONSE | cut -d: -f1)
          TOTAL_TIME=$(echo $RESPONSE | cut -d: -f2)
          CONNECT_TIME=$(echo $RESPONSE | cut -d: -f3)
          
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "total_time=$TOTAL_TIME" >> $GITHUB_OUTPUT
          echo "connect_time=$CONNECT_TIME" >> $GITHUB_OUTPUT
          echo "endpoint=$FULL_URL" >> $GITHUB_OUTPUT

      - name: Evaluate health status
        run: |
          HTTP_CODE=${{ steps.health-check.outputs.http_code }}
          TOTAL_TIME=${{ steps.health-check.outputs.total_time }}
          ENDPOINT=${{ steps.health-check.outputs.endpoint }}
          
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ $ENDPOINT - Healthy (${TOTAL_TIME}s)"
          elif [ "$HTTP_CODE" -eq 503 ]; then
            echo "⚠️ $ENDPOINT - Service Unavailable"
            exit 1
          elif [ "$HTTP_CODE" -eq 000 ]; then
            echo "❌ $ENDPOINT - Connection Failed"
            exit 1
          else
            echo "⚠️ $ENDPOINT - HTTP $HTTP_CODE (${TOTAL_TIME}s)"
            exit 1
          fi

      - name: Report to CloudWatch
        if: always()
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws configure set region ${{ env.AWS_REGION }}
          
          # Send custom metrics to CloudWatch
          aws cloudwatch put-metric-data \
            --namespace "WhatsOpi/HealthCheck" \
            --metric-data \
              MetricName=ResponseTime,Value=${{ steps.health-check.outputs.total_time }},Unit=Seconds,Dimensions=Environment=${{ matrix.environment }},Endpoint=${{ matrix.endpoint }} \
              MetricName=HttpStatusCode,Value=${{ steps.health-check.outputs.http_code }},Unit=Count,Dimensions=Environment=${{ matrix.environment }},Endpoint=${{ matrix.endpoint }}

  # Database Health Checks
  database-health-check:
    name: Database Health Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [production, staging]
        database: [postgresql, redis, opensearch]
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check PostgreSQL health
        if: matrix.database == 'postgresql'
        run: |
          # Get RDS instance metrics
          INSTANCE_ID="whatsopi-${{ matrix.environment }}-db"
          
          # Check CPU utilization
          CPU_UTIL=$(aws rds describe-db-instances \
            --db-instance-identifier $INSTANCE_ID \
            --query 'DBInstances[0].DBInstanceStatus' \
            --output text)
          
          echo "PostgreSQL Status: $CPU_UTIL"
          
          # Send metric to CloudWatch
          aws cloudwatch put-metric-data \
            --namespace "WhatsOpi/Database" \
            --metric-data MetricName=Status,Value=1,Unit=Count,Dimensions=Environment=${{ matrix.environment }},Database=postgresql

      - name: Check Redis health
        if: matrix.database == 'redis'
        run: |
          # Get ElastiCache cluster metrics
          CLUSTER_ID="whatsopi-${{ matrix.environment }}-redis"
          
          CLUSTER_STATUS=$(aws elasticache describe-cache-clusters \
            --cache-cluster-id $CLUSTER_ID \
            --query 'CacheClusters[0].CacheClusterStatus' \
            --output text 2>/dev/null || echo "not-found")
          
          echo "Redis Status: $CLUSTER_STATUS"
          
          if [ "$CLUSTER_STATUS" = "available" ]; then
            STATUS_VALUE=1
          else
            STATUS_VALUE=0
          fi
          
          aws cloudwatch put-metric-data \
            --namespace "WhatsOpi/Database" \
            --metric-data MetricName=Status,Value=$STATUS_VALUE,Unit=Count,Dimensions=Environment=${{ matrix.environment }},Database=redis

      - name: Check OpenSearch health
        if: matrix.database == 'opensearch'
        run: |
          # Check OpenSearch domain health
          DOMAIN_NAME="whatsopi-${{ matrix.environment }}-search"
          
          DOMAIN_STATUS=$(aws opensearch describe-domain \
            --domain-name $DOMAIN_NAME \
            --query 'DomainStatus.Processing' \
            --output text 2>/dev/null || echo "true")
          
          echo "OpenSearch Processing: $DOMAIN_STATUS"
          
          if [ "$DOMAIN_STATUS" = "false" ]; then
            STATUS_VALUE=1
          else
            STATUS_VALUE=0
          fi
          
          aws cloudwatch put-metric-data \
            --namespace "WhatsOpi/Database" \
            --metric-data MetricName=Status,Value=$STATUS_VALUE,Unit=Count,Dimensions=Environment=${{ matrix.environment }},Database=opensearch

  # Performance Monitoring
  performance-monitoring:
    name: Performance Monitoring
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 */2 * * *' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        environment: [production, staging]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run performance monitoring
        run: |
          ENVIRONMENT=${{ matrix.environment }}
          
          if [ "$ENVIRONMENT" = "production" ]; then
            BASE_URL="https://whatsopi.do"
          else
            BASE_URL="https://staging.whatsopi.do"
          fi
          
          # Run Lighthouse performance audit
          npx lighthouse "$BASE_URL" \
            --chrome-flags="--headless --no-sandbox" \
            --output=json \
            --output-path=./lighthouse-$ENVIRONMENT.json \
            --preset=perf \
            --throttling-method=simulate \
            --throttling.cpuSlowdownMultiplier=4 \
            --throttling.rttMs=150 \
            --throttling.throughputKbps=1600

      - name: Extract performance metrics
        run: |
          ENVIRONMENT=${{ matrix.environment }}
          
          # Extract key performance metrics
          FCP=$(jq -r '.audits["first-contentful-paint"].numericValue' lighthouse-$ENVIRONMENT.json)
          LCP=$(jq -r '.audits["largest-contentful-paint"].numericValue' lighthouse-$ENVIRONMENT.json)
          TTI=$(jq -r '.audits["interactive"].numericValue' lighthouse-$ENVIRONMENT.json)
          CLS=$(jq -r '.audits["cumulative-layout-shift"].numericValue' lighthouse-$ENVIRONMENT.json)
          SCORE=$(jq -r '.categories.performance.score' lighthouse-$ENVIRONMENT.json)
          
          echo "Performance Metrics for $ENVIRONMENT:"
          echo "FCP: ${FCP}ms"
          echo "LCP: ${LCP}ms"
          echo "TTI: ${TTI}ms"
          echo "CLS: $CLS"
          echo "Performance Score: $(echo "$SCORE * 100" | bc)%"
          
          # Save metrics for CloudWatch
          echo "FCP=$FCP" >> $GITHUB_ENV
          echo "LCP=$LCP" >> $GITHUB_ENV
          echo "TTI=$TTI" >> $GITHUB_ENV
          echo "CLS=$CLS" >> $GITHUB_ENV
          echo "PERF_SCORE=$(echo "$SCORE * 100" | bc)" >> $GITHUB_ENV

      - name: Send metrics to CloudWatch
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws configure set region ${{ env.AWS_REGION }}
          
          ENVIRONMENT=${{ matrix.environment }}
          
          # Send performance metrics to CloudWatch
          aws cloudwatch put-metric-data \
            --namespace "WhatsOpi/Performance" \
            --metric-data \
              MetricName=FirstContentfulPaint,Value=$FCP,Unit=Milliseconds,Dimensions=Environment=$ENVIRONMENT \
              MetricName=LargestContentfulPaint,Value=$LCP,Unit=Milliseconds,Dimensions=Environment=$ENVIRONMENT \
              MetricName=TimeToInteractive,Value=$TTI,Unit=Milliseconds,Dimensions=Environment=$ENVIRONMENT \
              MetricName=CumulativeLayoutShift,Value=$CLS,Unit=None,Dimensions=Environment=$ENVIRONMENT \
              MetricName=PerformanceScore,Value=$PERF_SCORE,Unit=Percent,Dimensions=Environment=$ENVIRONMENT

      - name: Check performance thresholds
        run: |
          ENVIRONMENT=${{ matrix.environment }}
          
          # Performance thresholds for Dominican Republic mobile users
          FCP_THRESHOLD=1500  # 1.5 seconds
          LCP_THRESHOLD=2500  # 2.5 seconds
          TTI_THRESHOLD=3000  # 3 seconds
          CLS_THRESHOLD=0.1   # 0.1 CLS
          SCORE_THRESHOLD=80  # 80% performance score
          
          ALERTS=""
          
          if (( $(echo "$FCP > $FCP_THRESHOLD" | bc -l) )); then
            ALERTS="$ALERTS\n❌ FCP: ${FCP}ms > ${FCP_THRESHOLD}ms"
          fi
          
          if (( $(echo "$LCP > $LCP_THRESHOLD" | bc -l) )); then
            ALERTS="$ALERTS\n❌ LCP: ${LCP}ms > ${LCP_THRESHOLD}ms"
          fi
          
          if (( $(echo "$TTI > $TTI_THRESHOLD" | bc -l) )); then
            ALERTS="$ALERTS\n❌ TTI: ${TTI}ms > ${TTI_THRESHOLD}ms"
          fi
          
          if (( $(echo "$CLS > $CLS_THRESHOLD" | bc -l) )); then
            ALERTS="$ALERTS\n❌ CLS: $CLS > $CLS_THRESHOLD"
          fi
          
          if (( $(echo "$PERF_SCORE < $SCORE_THRESHOLD" | bc -l) )); then
            ALERTS="$ALERTS\n❌ Performance Score: $PERF_SCORE% < $SCORE_THRESHOLD%"
          fi
          
          if [ -n "$ALERTS" ]; then
            echo "⚠️ Performance thresholds exceeded for $ENVIRONMENT:"
            echo -e "$ALERTS"
            echo "performance_alert=true" >> $GITHUB_ENV
          else
            echo "✅ All performance thresholds met for $ENVIRONMENT"
            echo "performance_alert=false" >> $GITHUB_ENV
          fi

      - name: Alert on performance degradation
        if: env.performance_alert == 'true'
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#alerts'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          text: |
            🚨 Performance Alert - ${{ matrix.environment }}
            
            Performance thresholds exceeded:
            • FCP: ${{ env.FCP }}ms (threshold: 1500ms)
            • LCP: ${{ env.LCP }}ms (threshold: 2500ms)
            • TTI: ${{ env.TTI }}ms (threshold: 3000ms)
            • CLS: ${{ env.CLS }} (threshold: 0.1)
            • Score: ${{ env.PERF_SCORE }}% (threshold: 80%)

  # Dominican-Specific Monitoring
  dominican-monitoring:
    name: Dominican Market Monitoring
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 */2 * * *' || github.event_name == 'workflow_dispatch'
    
    steps:
