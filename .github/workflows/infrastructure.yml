name: Infrastructure Management

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/**'
      - '.github/workflows/infrastructure.yml'
  pull_request:
    branches: [main]
    paths:
      - 'infrastructure/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Infrastructure action'
        required: true
        default: 'plan'
        type: choice
        options:
        - plan
        - apply
        - destroy
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - development
        - staging
        - production

env:
  TF_VERSION: '1.6.0'
  TF_IN_AUTOMATION: true
  TF_CLI_ARGS: '-no-color'
  AWS_REGION: 'us-east-1'

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: infrastructure/

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: infrastructure/terraform/

      - name: Terraform Validate
        run: terraform validate
        working-directory: infrastructure/terraform/

      - name: tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Run tflint
        run: |
          tflint --init
          tflint --recursive
        working-directory: infrastructure/terraform/

      - name: Checkov Security Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infrastructure/terraform/
          framework: terraform
          output_format: cli,sarif
          output_file_path: reports/checkov-results.sarif

      - name: Upload Checkov results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: reports/checkov-results.sarif

  cost-estimation:
    name: Cost Estimation
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=whatsopi-terraform-state" \
            -backend-config="key=staging/terraform.tfstate" \
            -backend-config="region=us-east-1"
        working-directory: infrastructure/terraform/environments/staging/

      - name: Terraform Plan for Cost Analysis
        run: terraform plan -out=tfplan
        working-directory: infrastructure/terraform/environments/staging/
        env:
          TF_VAR_environment: staging

      - name: Setup Infracost
        uses: infracost/actions/setup@v2
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate Infracost JSON
        run: |
          infracost breakdown --path . \
            --format json \
            --out-file infracost-base.json
        working-directory: infrastructure/terraform/environments/staging/

      - name: Post Infracost comment
        run: |
          infracost comment github --path infracost-base.json \
            --repo $GITHUB_REPOSITORY \
            --github-token ${{ secrets.GITHUB_TOKEN }} \
            --pull-request ${{ github.event.pull_request.number }} \
            --behavior update
        working-directory: infrastructure/terraform/environments/staging/

  plan-staging:
    name: Plan Staging Infrastructure
    runs-on: ubuntu-latest
    needs: [validate]
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=whatsopi-terraform-state" \
            -backend-config="key=staging/terraform.tfstate" \
            -backend-config="region=us-east-1"
        working-directory: infrastructure/terraform/environments/staging/

      - name: Terraform Plan
        run: terraform plan -detailed-exitcode -out=tfplan
        working-directory: infrastructure/terraform/environments/staging/
        env:
          TF_VAR_environment: staging
          TF_VAR_database_password: ${{ secrets.STAGING_DATABASE_PASSWORD }}
          TF_VAR_redis_auth_token: ${{ secrets.STAGING_REDIS_AUTH_TOKEN }}

      - name: Save Terraform Plan
        uses: actions/upload-artifact@v3
        with:
          name: staging-tfplan
          path: infrastructure/terraform/environments/staging/tfplan

  plan-production:
    name: Plan Production Infrastructure
    runs-on: ubuntu-latest
    needs: [validate]
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=whatsopi-terraform-state" \
            -backend-config="key=production/terraform.tfstate" \
            -backend-config="region=us-east-1"
        working-directory: infrastructure/terraform/environments/production/

      - name: Terraform Plan
        run: terraform plan -detailed-exitcode -out=tfplan
        working-directory: infrastructure/terraform/environments/production/
        env:
          TF_VAR_environment: production
          TF_VAR_database_password: ${{ secrets.PRODUCTION_DATABASE_PASSWORD }}
          TF_VAR_redis_auth_token: ${{ secrets.PRODUCTION_REDIS_AUTH_TOKEN }}
          TF_VAR_domain_name: whatsopi.do
          TF_VAR_api_domain_name: api.whatsopi.do

      - name: Save Terraform Plan
        uses: actions/upload-artifact@v3
        with:
          name: production-tfplan
          path: infrastructure/terraform/environments/production/tfplan

  apply-staging:
    name: Apply Staging Infrastructure
    runs-on: ubuntu-latest
    needs: [plan-staging]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' && github.event.inputs.environment == 'staging'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Terraform Plan
        uses: actions/download-artifact@v3
        with:
          name: staging-tfplan
          path: infrastructure/terraform/environments/staging/

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=whatsopi-terraform-state" \
            -backend-config="key=staging/terraform.tfstate" \
            -backend-config="region=us-east-1"
        working-directory: infrastructure/terraform/environments/staging/

      - name: Terraform Apply
        run: terraform apply tfplan
        working-directory: infrastructure/terraform/environments/staging/

      - name: Output Infrastructure Details
        run: |
          terraform output -json > staging-outputs.json
          echo "## Staging Infrastructure Outputs" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat staging-outputs.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        working-directory: infrastructure/terraform/environments/staging/

  apply-production:
    name: Apply Production Infrastructure
    runs-on: ubuntu-latest
    needs: [plan-production]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' && github.event.inputs.environment == 'production'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Terraform Plan
        uses: actions/download-artifact@v3
        with:
          name: production-tfplan
          path: infrastructure/terraform/environments/production/

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=whatsopi-terraform-state" \
            -backend-config="key=production/terraform.tfstate" \
            -backend-config="region=us-east-1"
        working-directory: infrastructure/terraform/environments/production/

      - name: Pre-apply Safety Checks
        run: |
          # Verify we're not destroying critical resources
          terraform show tfplan | grep -E "(destroy|delete)" && exit 1 || echo "No destructive changes detected"
          
          # Verify backup is recent
          aws rds describe-db-cluster-snapshots \
            --db-cluster-identifier whatsopi-prod-cluster \
            --query 'DBClusterSnapshots[0].SnapshotCreateTime' \
            --output text
        working-directory: infrastructure/terraform/environments/production/

      - name: Terraform Apply
        run: terraform apply tfplan
        working-directory: infrastructure/terraform/environments/production/

      - name: Post-apply Verification
        run: |
          # Verify EKS cluster is healthy
          aws eks describe-cluster --name whatsopi-prod-eks --query 'cluster.status'
          
          # Verify RDS cluster is available
          aws rds describe-db-clusters --db-cluster-identifier whatsopi-prod-cluster --query 'DBClusters[0].Status'
          
          # Verify load balancer is healthy
          aws elbv2 describe-load-balancers --names whatsopi-prod-alb --query 'LoadBalancers[0].State.Code'
        working-directory: infrastructure/terraform/environments/production/

      - name: Output Infrastructure Details
        run: |
          terraform output -json > production-outputs.json
          echo "## Production Infrastructure Outputs" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat production-outputs.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        working-directory: infrastructure/terraform/environments/production/

      - name: Update Kubernetes ConfigMaps
        run: |
          # Update kubeconfig
          aws eks update-kubeconfig --region $AWS_REGION --name whatsopi-prod-eks
          
          # Update application configuration
          kubectl create configmap whatsopi-config \
            --from-file=production-outputs.json \
            --dry-run=client -o yaml | kubectl apply -f -

  disaster-recovery-test:
    name: Disaster Recovery Test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'dr-test'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Test Database Backup Restore
        run: |
          # Create test database from latest backup
          LATEST_SNAPSHOT=$(aws rds describe-db-cluster-snapshots \
            --db-cluster-identifier whatsopi-prod-cluster \
            --query 'DBClusterSnapshots[0].DBClusterSnapshotIdentifier' \
            --output text)
          
          aws rds restore-db-cluster-from-snapshot \
            --db-cluster-identifier whatsopi-dr-test-$(date +%s) \
            --snapshot-identifier $LATEST_SNAPSHOT \
            --engine aurora-postgresql

      - name: Test Cross-Region Failover
        run: |
          # Verify read replica in DR region
          aws rds describe-db-clusters \
            --region us-east-2 \
            --db-cluster-identifier whatsopi-prod-replica \
            --query 'DBClusters[0].Status'

      - name: Test S3 Cross-Region Replication
        run: |
          # Verify objects are replicated
          aws s3 ls s3://whatsopi-static-assets-replica/ --region us-east-2 | head -5

      - name: Clean Up DR Test Resources
        run: |
          # Clean up test resources
          aws rds describe-db-clusters --query "DBClusters[?contains(DBClusterIdentifier, 'whatsopi-dr-test')].DBClusterIdentifier" --output text | \
          xargs -I {} aws rds delete-db-cluster --db-cluster-identifier {} --skip-final-snapshot

  security-baseline:
    name: Security Baseline Check
    runs-on: ubuntu-latest
    needs: [apply-production]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: AWS Config Rules Compliance
        run: |
          aws configservice get-compliance-summary-by-config-rule \
            --query 'ComplianceSummary' \
            --output table

      - name: Security Hub Findings
        run: |
          aws securityhub get-findings \
            --filters '{"ProductArn": [{"Value": "arn:aws:securityhub:::product/aws/securityhub", "Comparison": "EQUALS"}]}' \
            --query 'Findings[?Compliance.Status==`FAILED`].[Title,Severity.Label]' \
            --output table

      - name: GuardDuty Threat Detection
        run: |
          DETECTOR_ID=$(aws guardduty list-detectors --query 'DetectorIds[0]' --output text)
          aws guardduty get-findings \
            --detector-id $DETECTOR_ID \
            --finding-ids $(aws guardduty list-findings --detector-id $DETECTOR_ID --query 'FindingIds[0:5]' --output text) \
            --query 'Findings[?Severity>=7.0].[Title,Severity]' \
            --output table

  notify-infrastructure:
    name: Infrastructure Notification
    runs-on: ubuntu-latest
    needs: [apply-production, security-baseline]
    if: always()
    steps:
      - name: Notify Infrastructure Team
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#whatsopi-infrastructure'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
          text: |
            Infrastructure deployment completed for WhatsOpí
            Environment: ${{ github.event.inputs.environment || 'staging' }}
            Action: ${{ github.event.inputs.action || 'plan' }}
            Status: ${{ job.status }}