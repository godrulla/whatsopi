# WhatsOpí Prometheus Alerting Rules
# PCI DSS Level 1 and Dominican Law 172-13 compliant monitoring
# Optimized for 99.9% uptime requirements in Caribbean region

groups:
  # Critical System Alerts
  - name: whatsopi.critical
    interval: 30s
    rules:
      # Application availability
      - alert: WhatsOpiApplicationDown
        expr: up{job="whatsopi-backend"} == 0
        for: 30s
        labels:
          severity: critical
          service: backend
          compliance: pci_dss
          region: dominican_republic
        annotations:
          summary: "WhatsOpí backend application is down"
          description: "The WhatsOpí backend service has been down for more than 30 seconds. This affects all financial transactions."
          runbook_url: "https://docs.whatsopi.do/runbooks/backend-down"
          whatsapp_alert: "true"

      - alert: WhatsOpiFrontendDown
        expr: up{job="whatsopi-frontend"} == 0
        for: 1m
        labels:
          severity: critical
          service: frontend
          region: dominican_republic
        annotations:
          summary: "WhatsOpí frontend is unavailable"
          description: "The WhatsOpí frontend has been unavailable for more than 1 minute."
          runbook_url: "https://docs.whatsopi.do/runbooks/frontend-down"

      # Database connectivity
      - alert: PostgreSQLDown
        expr: up{job="postgres-exporter"} == 0
        for: 30s
        labels:
          severity: critical
          service: database
          compliance: pci_dss
        annotations:
          summary: "PostgreSQL database is down"
          description: "PostgreSQL database has been down for more than 30 seconds. All financial data is inaccessible."
          runbook_url: "https://docs.whatsopi.do/runbooks/database-down"
          whatsapp_alert: "true"

      # Redis cache connectivity
      - alert: RedisDown
        expr: up{job="redis-exporter"} == 0
        for: 1m
        labels:
          severity: high
          service: cache
        annotations:
          summary: "Redis cache is down"
          description: "Redis cache has been down for more than 1 minute. Session management and caching are affected."
          runbook_url: "https://docs.whatsopi.do/runbooks/redis-down"

  # Performance Alerts
  - name: whatsopi.performance
    interval: 30s
    rules:
      # High response time (critical for Caribbean users)
      - alert: HighAPILatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="whatsopi-backend"}[5m])) > 2
        for: 2m
        labels:
          severity: warning
          service: backend
          region: dominican_republic
        annotations:
          summary: "High API response time detected"
          description: "95th percentile API response time is {{ $value }}s, which is above the 2s threshold optimized for Caribbean networks."
          runbook_url: "https://docs.whatsopi.do/runbooks/high-latency"

      # High error rate
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }}, which exceeds the 5% threshold."
          runbook_url: "https://docs.whatsopi.do/runbooks/high-error-rate"

      # Database performance
      - alert: DatabaseHighConnectionUsage
        expr: pg_stat_activity_count / pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "High database connection usage"
          description: "Database connection usage is {{ $value | humanizePercentage }}, approaching the limit."
          runbook_url: "https://docs.whatsopi.do/runbooks/db-connections"

      - alert: DatabaseSlowQueries
        expr: rate(pg_stat_statements_mean_time_seconds[5m]) > 1
        for: 5m
        labels:
          severity: warning
          service: database
          compliance: pci_dss
        annotations:
          summary: "Database queries are running slowly"
          description: "Average query execution time is {{ $value }}s, which may impact user experience."
          runbook_url: "https://docs.whatsopi.do/runbooks/slow-queries"

  # Security and Compliance Alerts
  - name: whatsopi.security
    interval: 30s
    rules:
      # Failed authentication attempts
      - alert: HighFailedLoginAttempts
        expr: rate(auth_failed_attempts_total[5m]) > 5
        for: 1m
        labels:
          severity: warning
          service: auth
          compliance: pci_dss
          security: true
        annotations:
          summary: "High number of failed login attempts"
          description: "Failed login attempts rate is {{ $value }} per second over the last 5 minutes."
          runbook_url: "https://docs.whatsopi.do/runbooks/failed-logins"

      # Suspicious payment activity
      - alert: SuspiciousPaymentActivity
        expr: rate(payment_transactions_total{status="failed"}[5m]) > 10
        for: 30s
        labels:
          severity: high
          service: payments
          compliance: pci_dss
          security: true
        annotations:
          summary: "Suspicious payment activity detected"
          description: "High rate of failed payment transactions: {{ $value }} per second."
          runbook_url: "https://docs.whatsopi.do/runbooks/suspicious-payments"
          compliance_alert: "true"

      # SSL certificate expiry
      - alert: SSLCertificateExpiringSoon
        expr: probe_ssl_earliest_cert_expiry - time() < 86400 * 7
        for: 1h
        labels:
          severity: warning
          service: ssl
          compliance: pci_dss
        annotations:
          summary: "SSL certificate expiring soon"
          description: "SSL certificate for {{ $labels.instance }} expires in {{ $value | humanizeDuration }}."
          runbook_url: "https://docs.whatsopi.do/runbooks/ssl-renewal"

      # Rate limiting triggers
      - alert: RateLimitingTriggered
        expr: rate(nginx_http_requests_total{status="429"}[5m]) > 1
        for: 2m
        labels:
          severity: info
          service: nginx
          security: true
        annotations:
          summary: "Rate limiting is being triggered frequently"
          description: "Rate limiting is being triggered at {{ $value }} requests per second."
          runbook_url: "https://docs.whatsopi.do/runbooks/rate-limiting"

  # Business Logic Alerts (Dominican Republic specific)
  - name: whatsopi.business
    interval: 60s
    rules:
      # Transaction volume anomaly
      - alert: LowTransactionVolume
        expr: rate(payment_transactions_total[1h]) < 10
        for: 30m
        labels:
          severity: info
          service: business
        annotations:
          summary: "Unusually low transaction volume"
          description: "Transaction volume is {{ $value }} per hour, which is below normal levels for Dominican market."
          runbook_url: "https://docs.whatsopi.do/runbooks/low-volume"

      # High transaction volume (potential viral growth)
      - alert: HighTransactionVolume
        expr: rate(payment_transactions_total[5m]) > 100
        for: 5m
        labels:
          severity: info
          service: business
        annotations:
          summary: "Unusually high transaction volume"
          description: "Transaction volume spike detected: {{ $value }} per second. This may indicate viral growth or attack."
          runbook_url: "https://docs.whatsopi.do/runbooks/high-volume"

      # User registration rate
      - alert: HighUserRegistrationRate
        expr: rate(user_registrations_total[5m]) > 10
        for: 10m
        labels:
          severity: info
          service: business
        annotations:
          summary: "High user registration rate"
          description: "User registration rate is {{ $value }} per second, indicating strong growth."
          runbook_url: "https://docs.whatsopi.do/runbooks/high-registrations"

  # Infrastructure Alerts
  - name: whatsopi.infrastructure
    interval: 30s
    rules:
      # High CPU usage
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          service: infrastructure
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value }}% on {{ $labels.instance }}."
          runbook_url: "https://docs.whatsopi.do/runbooks/high-cpu"

      # High memory usage
      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes > 0.9
        for: 5m
        labels:
          severity: critical
          service: infrastructure
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ $value | humanizePercentage }} on {{ $labels.instance }}."
          runbook_url: "https://docs.whatsopi.do/runbooks/high-memory"

      # Disk space running low
      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.1
        for: 5m
        labels:
          severity: warning
          service: infrastructure
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Disk space is {{ $value | humanizePercentage }} full on {{ $labels.instance }}."
          runbook_url: "https://docs.whatsopi.do/runbooks/disk-space"

  # Network Alerts (Caribbean-specific)
  - name: whatsopi.network
    interval: 60s
    rules:
      # Dominican Republic network connectivity
      - alert: DominicanNetworkConnectivityIssue
        expr: probe_success{job="dominican-network-monitoring"} == 0
        for: 2m
        labels:
          severity: warning
          service: network
          region: dominican_republic
        annotations:
          summary: "Network connectivity issue to Dominican Republic ISPs"
          description: "Cannot reach {{ $labels.instance }} from monitoring location."
          runbook_url: "https://docs.whatsopi.do/runbooks/network-connectivity"

      # WhatsApp API connectivity
      - alert: WhatsAppAPIConnectivityIssue
        expr: probe_success{job="whatsapp-api-monitoring"} == 0
        for: 2m
        labels:
          severity: high
          service: whatsapp
          region: dominican_republic
        annotations:
          summary: "WhatsApp Business API connectivity issue"
          description: "Cannot reach WhatsApp Business API. This affects customer communication."
          runbook_url: "https://docs.whatsopi.do/runbooks/whatsapp-connectivity"

      # CDN performance
      - alert: CDNHighLatency
        expr: probe_duration_seconds{job="blackbox-http"} > 2
        for: 5m
        labels:
          severity: warning
          service: cdn
          region: dominican_republic
        annotations:
          summary: "High CDN latency from Dominican Republic"
          description: "CDN response time is {{ $value }}s for {{ $labels.instance }}."
          runbook_url: "https://docs.whatsopi.do/runbooks/cdn-latency"

  # Compliance Monitoring
  - name: whatsopi.compliance
    interval: 300s  # Check every 5 minutes
    rules:
      # Audit log availability
      - alert: AuditLogIngestionFailure
        expr: increase(log_ingestion_errors_total[5m]) > 0
        for: 1m
        labels:
          severity: high
          service: logging
          compliance: law_172_13
        annotations:
          summary: "Audit log ingestion failure"
          description: "{{ $value }} audit log ingestion errors in the last 5 minutes. This affects compliance."
          runbook_url: "https://docs.whatsopi.do/runbooks/audit-logs"

      # Data retention compliance
      - alert: DataRetentionPolicyViolation
        expr: data_retention_violations_total > 0
        for: 1m
        labels:
          severity: critical
          service: compliance
          compliance: law_172_13
        annotations:
          summary: "Data retention policy violation detected"
          description: "{{ $value }} data retention policy violations detected."
          runbook_url: "https://docs.whatsopi.do/runbooks/data-retention"
          compliance_alert: "true"

      # Encryption status
      - alert: EncryptionFailure
        expr: encryption_failures_total > 0
        for: 1m
        labels:
          severity: critical
          service: security
          compliance: pci_dss
        annotations:
          summary: "Data encryption failure"
          description: "{{ $value }} encryption failures detected. This violates PCI DSS requirements."
          runbook_url: "https://docs.whatsopi.do/runbooks/encryption-failure"
          compliance_alert: "true"
          whatsapp_alert: "true"