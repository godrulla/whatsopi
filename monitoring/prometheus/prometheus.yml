# Prometheus configuration for WhatsOpí production monitoring
# Optimized for Dominican Republic deployment with 99.9% uptime requirements
# Compliant with PCI DSS Level 1 and Dominican Law 172-13

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    region: 'dominican-republic'
    environment: 'production'
    compliance: 'pci-dss-law-172-13'
    cluster: 'whatsopi-prod'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093
      scheme: http
      timeout: 10s
      api_version: v2

# Rule files
rule_files:
  - "/etc/prometheus/rules/*.yml"

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 30s
    metrics_path: /metrics
    scheme: http

  # Node Exporter for system metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets:
        - 'node-exporter:9100'
    scrape_interval: 15s
    scrape_timeout: 10s

  # Application metrics from backend API
  - job_name: 'whatsopi-backend'
    static_configs:
      - targets:
        - 'backend:8080'
    metrics_path: /api/metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    scheme: http

  # Frontend application metrics
  - job_name: 'whatsopi-frontend'
    static_configs:
      - targets:
        - 'frontend:8080'
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s
    scheme: http

  # PostgreSQL database metrics
  - job_name: 'postgres-exporter'
    static_configs:
      - targets:
        - 'postgres-exporter:9187'
    scrape_interval: 30s
    scrape_timeout: 10s

  # Redis cache metrics
  - job_name: 'redis-exporter'
    static_configs:
      - targets:
        - 'redis-exporter:9121'
    scrape_interval: 30s
    scrape_timeout: 10s

  # Nginx metrics
  - job_name: 'nginx-exporter'
    static_configs:
      - targets:
        - 'nginx-exporter:9113'
    scrape_interval: 30s
    scrape_timeout: 10s

  # Kubernetes cluster metrics (if running on EKS)
  - job_name: 'kubernetes-apiservers'
    kubernetes_sd_configs:
      - role: endpoints
        namespaces:
          names:
            - default
            - production
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
        action: keep
        regex: default;kubernetes;https

  # Kubernetes nodes
  - job_name: 'kubernetes-nodes'
    kubernetes_sd_configs:
      - role: node
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
      - target_label: __address__
        replacement: kubernetes.default.svc:443
      - source_labels: [__meta_kubernetes_node_name]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /api/v1/nodes/${1}/proxy/metrics

  # Kubernetes pods
  - job_name: 'kubernetes-pods'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - production
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: kubernetes_pod_name

  # BlackBox exporter for external endpoint monitoring
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - https://whatsopi.do
        - https://api.whatsopi.do/health
        - https://media.whatsopi.do
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # SSL certificate expiry monitoring
  - job_name: 'blackbox-ssl'
    metrics_path: /probe
    params:
      module: [tls_connect]
    static_configs:
      - targets:
        - whatsopi.do:443
        - api.whatsopi.do:443
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Dominican Republic specific network monitoring
  - job_name: 'dominican-network-monitoring'
    metrics_path: /probe
    params:
      module: [icmp]
    static_configs:
      - targets:
        # Dominican ISP endpoints for network monitoring
        - 8.8.8.8  # Google DNS
        - 1.1.1.1  # Cloudflare DNS
        - 200.1.123.10  # Tricom (Dominican ISP)
        - 190.166.87.10  # Claro Dominican Republic
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
    scrape_interval: 60s

  # Business metrics from application
  - job_name: 'whatsopi-business-metrics'
    static_configs:
      - targets:
        - 'backend:8080'
    metrics_path: /api/metrics/business
    scrape_interval: 30s
    scrape_timeout: 10s

  # Compliance and audit metrics
  - job_name: 'whatsopi-compliance-metrics'
    static_configs:
      - targets:
        - 'backend:8080'
    metrics_path: /api/metrics/compliance
    scrape_interval: 60s
    scrape_timeout: 15s

  # Payment processing metrics (sensitive)
  - job_name: 'whatsopi-payment-metrics'
    static_configs:
      - targets:
        - 'backend:8080'
    metrics_path: /api/metrics/payments
    scrape_interval: 30s
    scrape_timeout: 10s
    # Additional security for payment metrics
    tls_config:
      insecure_skip_verify: false
    basic_auth:
      username: 'payment_metrics'
      password_file: '/etc/prometheus/secrets/payment_metrics_password'

  # WhatsApp Business API monitoring
  - job_name: 'whatsapp-api-monitoring'
    metrics_path: /probe
    params:
      module: [http_post_2xx]
    static_configs:
      - targets:
        - https://graph.facebook.com/v18.0/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
    scrape_interval: 60s

  # CDN and CloudFront monitoring
  - job_name: 'cloudfront-monitoring'
    ec2_sd_configs:
      - region: us-east-1
        port: 9100
        filters:
          - name: tag:Service
            values:
              - cloudfront-exporter
    relabel_configs:
      - source_labels: [__meta_ec2_tag_Name]
        target_label: instance_name

# Remote write configuration for long-term storage
remote_write:
  - url: https://aps-workspaces.us-east-1.amazonaws.com/workspaces/ws-xxxxx/api/v1/remote_write
    queue_config:
      max_samples_per_send: 1000
      max_shards: 200
      capacity: 2500
    write_relabel_configs:
      # Add Dominican Republic specific labels
      - target_label: region
        replacement: dominican_republic
      - target_label: compliance
        replacement: pci_dss_law_172_13

# Storage configuration
storage:
  tsdb:
    path: /prometheus/data
    retention.time: 15d
    retention.size: 10GB
    wal-compression: true

# Configuration for connecting to external services
tracing:
  jaeger:
    endpoint: http://jaeger:14268/api/traces

# Dominican Republic specific configuration
# Adjusted for Caribbean network conditions and compliance requirements